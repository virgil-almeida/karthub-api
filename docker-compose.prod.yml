services:
  karthub-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-karthub}
      POSTGRES_USER: ${POSTGRES_USER:-karthub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - karthub_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-karthub}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - karthub-net

  karthub-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    ports:
      - "8001:8000"
    depends_on:
      karthub-db:
        condition: service_healthy
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
    volumes:
      - karthub_static:/app/staticfiles
      - karthub_media:/app/media
    networks:
      - karthub-net

  karthub-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_DJANGO_API_URL: ${VITE_DJANGO_API_URL}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_SUPABASE_PROJECT_ID: ${VITE_SUPABASE_PROJECT_ID}
    restart: unless-stopped
    ports:
      - "8081:80"
    networks:
      - karthub-net

volumes:
  karthub_postgres_data:
  karthub_static:
  karthub_media:

networks:
  karthub-net:
    driver: bridge
