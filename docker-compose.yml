services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: karthub
      POSTGRES_USER: karthub
      POSTGRES_PASSWORD: karthub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U karthub"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: karthub
      DB_USER: karthub
      DB_PASSWORD: karthub
      DB_PORT: 5432
      SECRET_KEY: django-insecure-dev-only
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: "http://localhost:8080,http://127.0.0.1:8080"

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "8080:8080"
    env_file:
      - ./frontend/.env
    depends_on:
      - api

volumes:
  postgres_data:
  frontend_node_modules:
